<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body {
            background: #000;
            color: #8a0002;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
            margin: 0;
        }
        .loader {
            font-size: 2rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="loader">❆</div>
    <script>
        const path = window.location.pathname;
        const user = path.split('/').filter(Boolean)[0] || 'under';
        sessionStorage.setItem('whbf_user', user);
        
        // Fetch profile.html and inject it
        fetch('/profile.html')
            .then(response => response.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
                window.history.replaceState({}, '', '/' + user + '/');
                
                // Re-run scripts after injection
                const scripts = document.querySelectorAll('script');
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    document.body.appendChild(newScript);
                });
            })
            .catch(() => {
                window.location.replace('/profile.html?user=' + user);
            });
    </script>
</body>
</html>
