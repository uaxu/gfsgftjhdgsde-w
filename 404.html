<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body {
            background: #000;
            color: #8a0002;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
            margin: 0;
        }
        .loader {
            font-size: 2rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="loader">❆</div>
    <script>
        const path = window.location.pathname;
        const user = path.split('/').filter(Boolean)[0] || 'under';
        sessionStorage.setItem('whbf_user', user);
        
        // SIMPLE REDIRECT - no injection, no duplicate scripts
        window.location.href = '/profile.html?user=' + user;
    </script>
</body>
</html>
