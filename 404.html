<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body {
            background: #000;
            color: #8a0002;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
            margin: 0;
        }
        .loader {
            font-size: 2rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="loader">❆</div>
    <script src="/js/config.js"></script>
    <script>
        (function() {
            var path = window.location.pathname;
            var user = path.split('/').filter(Boolean)[0] || '';
            
            if (user && PROFILES[user]) {
                sessionStorage.setItem('whbf_user', user);
                window.location.replace('/profile.html?user=' + user);
            } else {
                window.location.replace('/');
            }
        })();
    </script>
</body>
</html>
