<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body {
        background: #000;
        height: 100vh;
        overflow: hidden;
        font-family: monospace;
        color: white;
        cursor: default;
    }

    .card-glow {
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.25);
        transform-style: preserve-3d;
        transition: transform 0.08s ease-out;
        will-change: transform;
    }

    .card-glow.active {
        transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg));
    }

    .snowflake {
        position: absolute;
        top: -10px;
        color: rgba(255, 0, 0, 0.5);
        user-select: none;
        pointer-events: none;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from { transform: translateY(0); }
        to { transform: translateY(120vh); }
    }

    .profile-img {
        transition: all 0.3s ease;
        transform-style: preserve-3d;
    }

    .profile-img:hover {
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
        transform: translateZ(20px) scale(1.05);
    }

    .btn {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border: 1px solid rgba(255,0,0,0.5);
        background: rgba(0,0,0,0.6);
        cursor: pointer;
        transition: all 0.3s ease;
        transform-style: preserve-3d;
    }

    .btn:hover {
        transform: translateY(4px) scale(1.05);
        box-shadow: 0 0 20px rgba(255,0,0,0.6);
    }

    .btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
    }

    .fade-in {
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .back-button {
        transition: all 0.3s ease;
        transform-style: preserve-3d;
    }

    .back-button:hover {
        transform: translateX(-5px);
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }

    #copy-warning {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(255,0,0,0.9);
        color: #fff;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 50;
    }

    #copy-warning.show {
        opacity: 1;
    }

    #enter-screen {
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, 0.7);
        transition: opacity 0.4s ease;
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .icon {
        width: 40px;
        height: 40px;
    }

    .icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Elementos dentro do card também seguem o 3D */
    .card-glow > * {
        transform-style: preserve-3d;
    }
</style>
</head>
<body class="flex flex-col items-center justify-center px-4">

<!-- ENTRY OVERLAY -->
<div id="enter-screen">
    <div class="text-red-600 text-3xl tracking-widest animate-pulse select-none">
      CLICK TO ENTER
    </div>
</div>

<!-- Botão de voltar -->
<a href="https://whbf.cc" 
   class="fixed top-8 left-8 z-20 back-button
          w-12 h-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-xl
          flex items-center justify-center text-red-500 text-2xl">
    ←
</a>

<div class="max-w-2xl w-full z-10 fade-in card-glow p-8 md:p-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-2xl" id="card">
    <div class="flex flex-col items-center text-center mb-8">
        <img src="/assets/under.png"
             alt="Profile" 
             class="profile-img w-32 h-32 rounded-full mb-4 object-cover">
        <h1 class="text-2xl font-bold text-red-500 lowercase tracking-wider mb-2" style="transform: translateZ(10px);">
            under
        </h1>
        <p class="text-xs text-gray-400 tracking-wide" style="transform: translateZ(10px);">
            - Consortia -
        </p>
    </div>

    <div class="flex flex-wrap justify-center gap-4">
        <div class="btn" data-copy="@scamism">
            <div class="icon">
                <img src="https://cdn.simpleicons.org/discord/8a0002">
            </div>
        </div>
        <div class="btn" data-copy="@fraudista">
            <div class="icon">
                <img src="https://cdn.simpleicons.org/telegram/8a0002">
            </div>
        </div>
        <div class="btn" data-copy="underwear@onionmail[.]org">
            <div class="icon">
                <img src="https://cdn.simpleicons.org/gmail/8a0002">
            </div>
        </div>
        <div class="btn" data-copy="underloves@nigge[.]rs">
            <div class="icon">
                <img src="https://cdn.simpleicons.org/gmail/8a0002">
            </div>
        </div>
        <div class="btn" data-copy="under@безспама[.]com">
            <div class="icon">
                <img src="https://cdn.simpleicons.org/gmail/8a0002">
            </div>
        </div>
    </div>
</div>

<!-- Warning de copy -->
<div id="copy-warning">The text was copied!</div>

<!-- Música de fundo -->
<audio id="bg-music" src="/assets/tripsyelakeramor.mp3" loop></audio>

<!-- Particles -->
<script>
    const createParticle = () => {
        const p = document.createElement('div');
        p.className = 'snowflake';
        p.style.left = Math.random() * window.innerWidth + 'px';
        p.style.fontSize = Math.random() * 14 + 6 + 'px';
        p.style.animationDuration = Math.random() * 6 + 6 + 's';
        p.innerText = '❆';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 12000);
    };
    setInterval(createParticle, 300);
</script>

<!-- Copy text com warning -->
<script>
    const warning = document.getElementById('copy-warning');

    document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => {
            const text = btn.dataset.copy;
            navigator.clipboard.writeText(text);

            warning.classList.add('show');
            setTimeout(() => warning.classList.remove('show'), 1000);

            btn.style.boxShadow = '0 0 25px rgba(255,0,0,0.8)';
            setTimeout(() => btn.style.boxShadow = '', 300);
        });
    });
</script>

<!-- Card 3D hover - AGORA SEGUE O MOUSE NA PÁGINA INTEIRA -->
<script>
    const card = document.getElementById('card');
    let isActive = false;
    let currentX = 0;
    let currentY = 0;
    let targetX = 0;
    let targetY = 0;
    let rafId = null;

    function smoothUpdate() {
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;

        if (Math.abs(currentX) < 0.01 && Math.abs(currentY) < 0.01 && !isActive) {
            card.classList.remove('active');
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            return;
        }

        card.style.setProperty('--rotate-x', `${currentY}deg`);
        card.style.setProperty('--rotate-y', `${currentX}deg`);
        card.classList.add('active');

        rafId = requestAnimationFrame(smoothUpdate);
    }

    function updateCardRotation(e) {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;

        const mouseX = e.clientX / windowWidth;
        const mouseY = e.clientY / windowHeight;

        const centerX = mouseX - 0.5;
        const centerY = mouseY - 0.5;
        const intensity = 35;

        targetX = -centerX * intensity;
        targetY = centerY * intensity;

        isActive = true;

        if (!rafId) {
            smoothUpdate();
        }
    }

    function resetCardRotation() {
        targetX = 0;
        targetY = 0;
        isActive = false;
    }

    document.addEventListener('mousemove', updateCardRotation);
    document.addEventListener('mouseleave', resetCardRotation);

    document.addEventListener('mouseenter', () => {
        isActive = true;
        if (!rafId) {
            smoothUpdate();
        }
    });
</script>

<!-- Entry + música + título animado -->
<script>
    const enterScreen = document.getElementById('enter-screen');
    const music = document.getElementById('bg-music');
    music.volume = 0.1;

    const titles = ["u","un","und","unde","under","unde","und","un"];
    let tIndex = 0;
    setInterval(() => {
        document.title = titles[tIndex];
        tIndex = (tIndex + 1) % titles.length;
    }, 500);

    enterScreen.addEventListener('click', () => {
        music.play().catch(() => {});
        enterScreen.style.opacity = '0';
        enterScreen.style.pointerEvents = 'none';
        setTimeout(() => enterScreen.remove(), 400);
    });
</script>

</body>
</html>
