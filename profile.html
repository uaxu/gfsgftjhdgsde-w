<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">WHBF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="flex flex-col items-center justify-center px-4 min-h-screen bg-black">

    <div id="enter-screen" style="position: fixed; inset: 0; z-index: 9999; backdrop-filter: blur(12px); background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.5s ease;">
        <div class="text-red-600 text-3xl tracking-widest animate-pulse select-none">
            CLICK TO ENTER
        </div>
    </div>

    <a href="https://whbf.cc" 
       class="fixed top-8 left-8 z-20 back-button
              w-12 h-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-xl
              flex items-center justify-center text-red-500 text-2xl hover:scale-105 transition">
        ←
    </a>

    <div class="max-w-2xl w-full z-10 fade-in card-glow p-8 md:p-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-2xl opacity-0" id="card">
        <div class="flex flex-col items-center text-center mb-8">
            <img id="profile-img" src="" alt="Profile" class="profile-img w-32 h-32 rounded-full mb-4 object-cover border-2 border-red-600/50">
            <h1 id="profile-name" class="text-2xl font-bold text-red-500 lowercase tracking-wider mb-2" style="transform: translateZ(10px);"></h1>
            <p id="profile-group" class="text-xs text-gray-400 tracking-wide" style="transform: translateZ(10px);"></p>
        </div>
        <div id="buttons-container" class="flex flex-wrap justify-center gap-4"></div>
    </div>

    <div id="copy-warning" style="position: fixed; top: 20px; right: 20px; background: rgba(255,0,0,0.9); color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 50;">
        The text was copied!
    </div>

    <audio id="bg-music" src="" loop></audio>
    
    <script>
        // --- RESTAURAR URL PARA /user/ ---
        (function restoreURL() {
            var params = new URLSearchParams(window.location.search);
            var user = params.get('user');
            
            if (user) {
                sessionStorage.setItem('whbf_user', user);
                var cleanPath = '/' + user + '/';
                window.history.replaceState({}, '', cleanPath);
            }
        })();
    </script>

    <script src="/js/config.js"></script>
    <script>
        // --- PROFILE DATA LOADING ---
        (function loadProfile() {
            var user = sessionStorage.getItem('whbf_user') || 'under';
            var profile = PROFILES[user];

            if (!profile) {
                window.location.href = 'https://whbf.cc';
                return;
            }

            document.getElementById('page-title').textContent = profile.name;
            document.getElementById('profile-img').src = profile.image;
            document.getElementById('profile-img').alt = profile.name;
            document.getElementById('profile-name').textContent = profile.name;
            document.getElementById('profile-group').textContent = `- ${profile.group} -`;
            document.getElementById('bg-music').src = profile.music;

            var container = document.getElementById('buttons-container');
            container.innerHTML = '';

            profile.buttons.forEach(function(btn) {
                var div = document.createElement('div');
                div.className = 'btn';
                
                // Se for link (URL), abre em nova aba
                if (btn.label.startsWith('http://') || btn.label.startsWith('https://')) {
                    var a = document.createElement('a');
                    a.href = btn.label;
                    a.target = '_blank';
                    a.className = 'btn';
                    a.innerHTML = '<div class="icon"><img src="' + btn.icon + '" alt="ícone"></div>';
                    container.appendChild(a);
                } else {
                    // Senão, é copy
                    div.dataset.copy = btn.label;
                    div.innerHTML = '<div class="icon"><img src="' + btn.icon + '" alt="ícone"></div>';
                    container.appendChild(div);
                }
            });

            // --- ADICIONAR EVENT LISTENERS DE COPY DEPOIS DOS BOTÕES SEREM CRIADOS ---
            setupCopyListeners();
        })();

        // --- FUNÇÃO PARA CONFIGURAR COPY ---
        function setupCopyListeners() {
            var warning = document.getElementById('copy-warning');
            if (!warning) return;

            document.querySelectorAll('[data-copy]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var text = this.dataset.copy;
                    
                    // Tentar copiar usando a API moderna
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(text).then(function() {
                            showCopyWarning(warning);
                            flashButton(this);
                        }.bind(this)).catch(function() {
                            fallbackCopy(text, warning, this);
                        }.bind(this));
                    } else {
                        fallbackCopy(text, warning, this);
                    }
                });
            });
        }

        // --- MOSTRAR WARNING ---
        function showCopyWarning(warning) {
            warning.classList.add('show');
            setTimeout(function() {
                warning.classList.remove('show');
            }, 1000);
        }

        // --- FLASH NO BOTÃO ---
        function flashButton(btn) {
            btn.style.boxShadow = '0 0 25px rgba(255,0,0,0.8)';
            setTimeout(function() {
                btn.style.boxShadow = '';
            }, 300);
        }

        // --- MÉTODO FALLBACK PARA COPY ---
        function fallbackCopy(text, warning, btn) {
            var textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showCopyWarning(warning);
                flashButton(btn);
            } catch (err) {
                console.error('Falha ao copiar:', err);
            }
            textArea.remove();
        }
    </script>

    <script>
        // --- ENTER SCREEN LOGIC ---
        (function setupEnterScreen() {
            var enterScreen = document.getElementById('enter-screen');
            var music = document.getElementById('bg-music');
            
            if (!enterScreen) return;
            
            enterScreen.addEventListener('click', function() {
                if (music) {
                    music.volume = 0.1;
                    music.play().catch(function() {});
                }
                this.style.opacity = '0';
                this.style.pointerEvents = 'none';
                setTimeout(function() {
                    if (this.parentNode) this.remove();
                }.bind(this), 500);
            });
        })();
    </script>

    <script src="/js/main.js"></script>
</body>
</html>
