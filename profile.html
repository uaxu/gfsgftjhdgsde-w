<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">WHBF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="flex flex-col items-center justify-center px-4">
    <div id="enter-screen">
        <div class="text-red-600 text-3xl tracking-widest animate-pulse select-none">
            CLICK TO ENTER
        </div>
    </div>
    <a href="https://whbf.cc" 
       class="fixed top-8 left-8 z-20 back-button
              w-12 h-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-xl
              flex items-center justify-center text-red-500 text-2xl">
        ←
    </a>
    <div class="max-w-2xl w-full z-10 fade-in card-glow p-8 md:p-12 bg-black/60 backdrop-blur-md border border-red-600/80 rounded-2xl opacity-0" id="card">
        <div class="flex flex-col items-center text-center mb-8">
            <img id="profile-img" src="" alt="Profile" class="profile-img w-32 h-32 rounded-full mb-4 object-cover">
            <h1 id="profile-name" class="text-2xl font-bold text-red-500 lowercase tracking-wider mb-2" style="transform: translateZ(10px);"></h1>
            <p id="profile-group" class="text-xs text-gray-400 tracking-wide" style="transform: translateZ(10px);"></p>
        </div>
        <div id="buttons-container" class="flex flex-wrap justify-center gap-4"></div>
    </div>
    <div id="copy-warning">The text was copied!</div>
    <audio id="bg-music" src="" loop></audio>
    <script src="/js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const user = params.get('user') || 'under';
            const profile = PROFILES[user];

            if (!profile) {
                window.location.href = 'https://whbf.cc';
                return;
            }

            document.getElementById('page-title').textContent = profile.name;
            document.getElementById('profile-img').src = profile.image;
            document.getElementById('profile-img').alt = profile.name;
            document.getElementById('profile-name').textContent = profile.name;
            document.getElementById('profile-group').textContent = `- ${profile.group} -`;
            document.getElementById('bg-music').src = profile.music;

            const container = document.getElementById('buttons-container');
            container.innerHTML = '';

            const iconMap = {
                discord: 'https://cdn.simpleicons.org/discord/8a0002',
                telegram: 'https://cdn.simpleicons.org/telegram/8a0002',
                gmail: 'https://cdn.simpleicons.org/gmail/8a0002',
                instagram: 'https://cdn.simpleicons.org/instagram/8a0002',
                twitter: 'https://cdn.simpleicons.org/twitter/8a0002',
                youtube: 'https://cdn.simpleicons.org/youtube/8a0002',
                github: 'https://cdn.simpleicons.org/github/8a0002'
            };

            profile.buttons.forEach(btn => {
                const div = document.createElement('div');
                div.className = 'btn';
                div.dataset.copy = btn.label;
                div.innerHTML = `<div class="icon"><img src="${iconMap[btn.icon] || iconMap.gmail}" alt="${btn.icon}"></div>`;
                container.appendChild(div);
            });

            const script = document.createElement('script');
            script.src = '/js/main.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
